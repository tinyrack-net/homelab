apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb-release
  namespace: metallb-system
spec:
  chart:
    spec:
      chart: metallb
      version: '0.16.1'
      sourceRef:
        kind: HelmRepository
        name: metallb-repository
        namespace: flux-system
  interval: 5m
  timeout: 5m
  releaseName: metallb
