apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: mariadb-operator
  namespace: kube-prometheus-stack-system
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - mariadb-operator-system
  selector:
    matchLabels:
      app.kubernetes.io/instance: mariadb-operator
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
