apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack-release
  namespace: kube-prometheus-stack-system
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.4.0"
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack-repository
        namespace: flux-system
  interval: 5m
  timeout: 5m
  releaseName: kube-prometheus-stack
  values:
    grafana:
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.observability-system.svc.cluster.local:3100
          isDefault: false
      persistence:
        enabled: true
        type: pvc
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        size: 10Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          kubernetes.io/ingress.class: traefik
        hosts:
          - grafana.intranet.winetree94.com
        tls:
          - secretName: letsencrypt-cert
            hosts:
              - grafana.intranet.winetree94.com
    prometheus:
      prometheusSpec:
        retention: 15d
        retentionSize: 40GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi
