apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-external-release
  namespace: traefik-external-system
spec:
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik-repository
        namespace: flux-system
  interval: 5m
  timeout: 5m
  releaseName: traefik-external
  values:
    ports:
      postgres:
        port: 5432
        expose:
          default: true
        exposedPort: 5432
        protocol: TCP
    # WebDAV uploads can be very large and slow; Traefik's default readTimeout
    # limits the total time allowed to read the request body, which caused
    # long-running DAV uploads to be interrupted before completion.
    additionalArguments:
      - --entryPoints.websecure.transport.respondingTimeouts.readTimeout=0s
      - --entryPoints.websecure.transport.respondingTimeouts.idleTimeout=600s
    providers:
      kubernetesCRD:
        allowExternalNameServices: true
        ingressClass: "traefik-external"
      kubernetesIngress:
        allowExternalNameServices: true
        ingressClass: "traefik-external"
    deployment:
      replicas: 2
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: "traefik-external"
    service:
      externalIPs:
        - 10.132.246.2
