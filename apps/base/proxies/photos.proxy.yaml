apiVersion: v1
kind: Namespace
metadata:
  name: photos-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: photos-proxy-service
  namespace: photos-proxy
spec:
  type: ExternalName
  ports:
    - port: 2283
      name: http
  externalName: 10.132.245.8
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: photos-ingress-route
  namespace: photos-proxy
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`photos.winetree94.com`)
      kind: Rule
      services:
        - name: photos-proxy-service
          kind: Service
          port: 2283
          passHostHeader: true
          scheme: http
  tls:
    secretName: letsencrypt-cert
