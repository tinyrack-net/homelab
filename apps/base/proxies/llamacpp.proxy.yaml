apiVersion: v1
kind: Namespace
metadata:
  name: llamacpp-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: llamacpp-proxy-service
  namespace: llamacpp-proxy
spec:
  type: ExternalName
  ports:
    - port: 8080
      name: api
  externalName: 10.132.247.34
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: llamacpp-ingress-route
  namespace: llamacpp-proxy
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`llamacpp.winetree94.com`)
      kind: Rule
      services:
        - name: llamacpp-proxy-service
          kind: Service
          port: 8080
          passHostHeader: true
          scheme: http
  tls:
    secretName: letsencrypt-cert
