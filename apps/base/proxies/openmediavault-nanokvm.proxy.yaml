apiVersion: v1
kind: Namespace
metadata:
  name: openmediavault-nanokvm-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: openmediavault-nanokvm-proxy-service
  namespace: openmediavault-nanokvm-proxy
spec:
  type: ExternalName
  ports:
    - port: 80
      name: api
  externalName:  10.132.245.44
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openmediavault-nanokvm-ingress-route
  namespace: openmediavault-nanokvm-proxy
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openmediavault.nanokvm.intranet.winetree94.com`)
      kind: Rule
      services:
        - name: openmediavault-nanokvm-proxy-service
          kind: Service
          port: 80
          passHostHeader: true
          scheme: http
  tls:
    secretName: letsencrypt-cert
