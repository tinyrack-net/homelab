apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyauth
  namespace: tinyauth-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinyauth
  template:
    metadata:
      labels:
        app: tinyauth
    spec:
      containers:
        - name: tinyauth
          image: ghcr.io/tinyrack-net/tinyauth:latest
          imagePullPolicy: Always
          command:
            - node
            - dist/cli.js
            - serve
            - --config-path=/config/config.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: tinyauth-secrets
          env:
            - name: TINYAUTH_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: tinyauth-database-user-secret
                  key: username
            - name: TINYAUTH_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tinyauth-database-user-secret
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: tinyauth-config
