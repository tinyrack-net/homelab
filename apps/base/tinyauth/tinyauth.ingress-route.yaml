apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tinyauth-ingress-route
  namespace: tinyauth-system
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`tinyauth.intranet.winetree94.com`)
      kind: Rule
      services:
        - name: tinyauth-service
          port: 8080
  tls:
    secretName: letsencrypt-cert
