apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulwark
  namespace: bulwark-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bulwark
  template:
    metadata:
      annotations:
        bulwark.winetree94.com/config-revision: oidc-private-endpoints-20260624-1810
      labels:
        app: bulwark
    spec:
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.38.0
          command:
            - sh
            - -c
            - chown -R 1001:65533 /app/data/settings /app/data/admin /app/data/admin-state /app/data/telemetry
          volumeMounts:
            - name: settings
              mountPath: /app/data/settings
            - name: admin
              mountPath: /app/data/admin
            - name: admin-state
              mountPath: /app/data/admin-state
            - name: telemetry
              mountPath: /app/data/telemetry
      containers:
        - name: bulwark
          image: ghcr.io/bulwarkmail/webmail:1.7.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: bulwark-config
            - secretRef:
                name: bulwark-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: settings
              mountPath: /app/data/settings
            - name: admin
              mountPath: /app/data/admin
            - name: admin-state
              mountPath: /app/data/admin-state
            - name: telemetry
              mountPath: /app/data/telemetry
      volumes:
        - name: settings
          persistentVolumeClaim:
            claimName: bulwark-settings
        - name: admin
          persistentVolumeClaim:
            claimName: bulwark-admin
        - name: admin-state
          persistentVolumeClaim:
            claimName: bulwark-admin-state
        - name: telemetry
          persistentVolumeClaim:
            claimName: bulwark-telemetry
