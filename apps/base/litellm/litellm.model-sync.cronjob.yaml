apiVersion: batch/v1
kind: CronJob
metadata:
  name: litellm-model-sync
  namespace: litellm-system
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: litellm-model-sync
          containers:
            - name: sync
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: LLAMA_SWAP_URL
                  value: http://10.132.247.31:18080/v1
              envFrom:
                - secretRef:
                    name: litellm-secret
              command:
                - sh
                - -c
                - |
                  pip install --quiet urllib3 && python /app/generate-litellm-config.py
              volumeMounts:
                - name: sync-config
                  mountPath: /app
                  readOnly: true
          volumes:
            - name: sync-config
              configMap:
                name: litellm-model-sync
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-model-sync
  namespace: litellm-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: litellm-model-sync
  namespace: litellm-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["litellm-config"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["litellm-deployment"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litellm-model-sync
  namespace: litellm-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: litellm-model-sync
subjects:
  - kind: ServiceAccount
    name: litellm-model-sync
    namespace: litellm-system
