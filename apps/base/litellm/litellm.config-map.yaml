            api_key: os.environ/LLAMACPP_API_KEY
        - model_name: gemma4-31b
          litellm_params:
            model: openai/gemma4-31b
            api_base: http://10.132.247.31:18080/v1
            api_key: os.environ/LLAMA_SWAP_B70_API_KEY
        - model_name: gemma4-31b-fast
