apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm-system
data:
  config.yaml: |
    litellm_settings:
      request_timeout: 600
      json_logs: true
      drop_params: true
    
    router_settings:
      routing_strategy: simple-shuffle
    
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      disable_spend_logs: true
      disable_spend_updates: true
      disable_error_logs: true
      disable_reset_budget: true
      disable_adding_master_key_hash_to_db: true
    
      user_header_mappings:
        - header_name: X-OpenWebUI-User-Id
          litellm_user_role: internal_user
        - header_name: X-OpenWebUI-User-Email
          litellm_user_role: customer
    
    model_list:
        - model_name: gemma-4-E4B-it-Q4_K_M
          litellm_params:
            model: openai/gemma-4-E4B-it-Q4_K_M
            api_base: http://10.132.247.31:18080/v1
            api_key: os.environ/LLAMACPP_API_KEY
        - model_name: gpt-5.5
          litellm_params:
            model: openai/gpt-5.5
            api_base: http://10.132.247.31:18080/v1
            api_key: os.environ/LLAMACPP_API_KEY
        - model_name: gemma-4-12B-it-qat-GGUF
          litellm_params:
            model: openai/gemma-4-12B-it-qat-GGUF
