apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm-system
data:
  config.yaml: |
    litellm_settings:
      request_timeout: 600
      json_logs: true
      drop_params: true
    
    router_settings:
      routing_strategy: simple-shuffle
    
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      disable_spend_logs: true
      disable_spend_updates: true
      disable_error_logs: true
      disable_reset_budget: true
      disable_adding_master_key_hash_to_db: true
    
      user_header_mappings:
        - header_name: X-OpenWebUI-User-Id
          litellm_user_role: internal_user
        - header_name: X-OpenWebUI-User-Email
          litellm_user_role: customer
    
    model_list:
      - model_name: desktop/gemma4-12b-qat
        litellm_params:
          model: openai/gemma4-12b-qat
          api_base: http://10.132.247.31:18080/v1
          api_key: os.environ/LLAMA_SWAP_B70_API_KEY
      - model_name: desktop/gemma4-26b-a4b-qat
        litellm_params:
          model: openai/gemma4-26b-a4b-qat
          api_base: http://10.132.247.31:18080/v1
          api_key: os.environ/LLAMA_SWAP_B70_API_KEY
      - model_name: desktop/gemma4-e4b-qat
        litellm_params:
          model: openai/gemma4-e4b-qat
          api_base: http://10.132.247.31:18080/v1
          api_key: os.environ/LLAMA_SWAP_B70_API_KEY
      - model_name: ubuntu-gpu/gemma-4-e4b-qat
        litellm_params:
          model: openai/gemma-4-E4B-it-qat-UD-Q4_K_XL.gguf
          api_base: http://10.132.247.34:8080/v1
          api_key: os.environ/UBUNTU_GPU_LLAMA_API_KEY
      - model_name: desktop/qwen3-coder-next
        litellm_params:
          model: openai/qwen3-coder-next
          api_base: http://10.132.247.31:18080/v1
          api_key: os.environ/LLAMA_SWAP_B70_API_KEY
      - model_name: desktop/qwen3.6-27b
        litellm_params:
          model: openai/qwen3.6-27b
          api_base: http://10.132.247.31:18080/v1
          api_key: os.environ/LLAMA_SWAP_B70_API_KEY
