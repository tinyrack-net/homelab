apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openwebui-helm-release
  namespace: openwebui-system
spec:
  releaseName: openwebui
  interval: 5m
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: openwebui-terminals-orchestrator
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: TERMINALS_KUBERNETES_STORAGE_SIZE
                  value: "10Gi"
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: TERMINALS_KUBERNETES_STORAGE_CLASS
                  value: "longhorn"
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: TERMINALS_KUBERNETES_STORAGE_MODE
                  value: "per-user"
              - op: add
                path: /spec/template/spec/containers/0/command
                value:
                  - /bin/sh
                  - -lc
              - op: add
                path: /spec/template/spec/containers/0/args
                value:
                  - |-
                    python - <<'PY'
                    from pathlib import Path

                    path = Path('/app/terminals/backends/kubernetes_operator.py')
                    text = path.read_text()
                    old_lines = [
                        'storage_size = s.get("storage")  # absent = ephemeral',
                        'storage_size = s.get("storage", settings.kubernetes_storage_size)  # default from env for persistent terminals',
                    ]
                    new = 'storage_size = s.get("storage") or settings.kubernetes_storage_size  # default from env for persistent terminals'
                    for old in old_lines:
                        if old in text:
                            path.write_text(text.replace(old, new))
                            break
                    else:
                        if new not in text:
                            raise SystemExit('unexpected kubernetes_operator.py storage line')
                    PY
                    exec /usr/local/bin/terminals serve
  chart:
    spec:
      chart: open-webui
      version: "15.1.0"
      sourceRef:
        kind: HelmRepository
        name: openwebui-repository
        namespace: flux-system
  values:
    fullnameOverride: open-webui
    tika:
      enabled: true
      image:
        tag: 3.3.1.0-full
    ollama:
      enabled: false
    pipelines:
      enabled: false
    websocket:
      enabled: true
      redis:
        enabled: true
    terminals:
      enabled: true
      existingSecret: openwebui-terminals-api-key
      crd:
        install: true
      operator:
        image:
          repository: ghcr.io/open-webui/terminals-operator
          tag: "0.0.4"
      orchestrator:
        image:
          repository: ghcr.io/open-webui/terminals
          tag: "0.0.4"
        backend: kubernetes-operator
        terminalImage: "ghcr.io/open-webui/open-terminal:0.11.34"
        terminalImagePullPolicy: IfNotPresent
        idleTimeoutMinutes: 30
      terminalDefaults:
        persistence:
          enabled: true
          size: "10Gi"
          storageClass: "longhorn"
    replicaCount: 2
    persistence:
      enabled: false
      provider: s3
      s3:
        accessKeyExistingSecret: tinyrack-homelab-s3-secret
        accessKeyExistingAccessKey: AWS_ACCESS_KEY_ID
        secretKeyExistingSecret: tinyrack-homelab-s3-secret
        secretKeyExistingSecretKey: AWS_SECRET_ACCESS_KEY
        endpointUrl: "https://storage.winetree94.com"
        region: "home"
        bucket: "tinyrack-homelab-openwebui-storage"
    sso:
      enabled: true
      enableSignup: true
      mergeAccountsByEmail: true
      oidc:
        clientExistingSecret: openwebui-oauth-secret
        clientExistingSecretKey: client_secret
        clientId: cM329FCwUpqO55pUrMWRjj4abLCeFVGIm7D7lm3B
        enabled: true
        providerName: "tinyauth"
        providerUrl: "https://auth.winetree94.com/oauth/.well-known/openid-configuration"
    extraEnvVars:
      # DB
      - name: DATABASE_USER
        valueFrom:
          secretKeyRef:
            name: openwebui-database-user-secret
            key: username
      - name: DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: openwebui-database-user-secret
            key: password
      - name: DATABASE_URL
        value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@openwebui-database-cluster-rw.openwebui-system.svc.cluster.local:5432/openwebui?sslmode=disable"

      # Redis
      # OIDC
      - name: OPENID_REDIRECT_URI
        value: "https://ai.winetree94.com/oauth/oidc/callback"
      - name: OAUTH_CODE_CHALLENGE_METHOD
        value: "S256"
      - name: OAUTH_TOKEN_ENDPOINT_AUTH_METHOD
        value: "client_secret_post"
      - name: WEBUI_URL
        value: "https://ai.winetree94.com"

      # AUTH
      - name: ENABLE_LOGIN_FORM
        value: "false"
      - name: ENABLE_SIGNUP
        value: "false"
      # CONFIG
      - name: BYPASS_MODEL_ACCESS_CONTROL
        value: "false"
      - name: ENABLE_FORWARD_USER_INFO_HEADERS
        value: "True"
      - name: WEBUI_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: openwebui-secret
            key: secret-key
