apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: searxng-system
data:
  settings.yml: |
    use_default_settings: true

    general:
      instance_name: "SearXNG"
      enable_metrics: false

    server:
      port: 8080
      bind_address: "0.0.0.0"
      secret_key:
      base_url:
      limiter: true
      public_instance: true
      image_proxy: false
      method: "POST"

    search:
      safe_search: 0
      default_lang: "en"
      formats:
        - html
        - json

    engines:
      - name: karma
        disabled: true

    ui:
      default_theme: simple
      default_locale: "en"
      theme_args:
        simple_style: black
      query_in_title: false

    valkey:
      url:
