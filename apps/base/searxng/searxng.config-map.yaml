apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: searxng-system
data:
  settings.yml: |
    use_default_settings: true

    general:
      instance_name: "SearXNG"
      enable_metrics: false

    server:
      port: 8080
      bind_address: "0.0.0.0"
      secret_key:
      base_url:
      limiter: true
      public_instance: true
      image_proxy: false
      method: "POST"
      http_protocol_version: "1.1"

    search:
      safe_search: 0
      default_lang: "en"
      formats:
        - html
        - json

    outgoing:
      request_timeout: 3.0
      max_request_timeout: 6.0
      pool_connections: 200
      pool_maxsize: 50
      keepalive_expiry: 30.0
      enable_http2: true

    engines:
      - name: karmasearch
        disabled: true
      - name: karmasearch images
        disabled: true
      - name: karmasearch videos
        disabled: true
      - name: karmasearch news
        disabled: true
      - name: startpage
        disabled: true
      - name: startpage news
        disabled: true
      - name: startpage images
        disabled: true
      - name: wikidata
        disabled: true
      - name: brave
        disabled: true
      - name: brave.images
        disabled: true
      - name: brave.videos
        disabled: true
      - name: brave.news
        disabled: true

    ui:
      default_theme: simple
      default_locale: "en"
      theme_args:
        simple_style: black
      query_in_title: false

    valkey:
      url:
