apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng-system
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          env:
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: secret_key
            - name: SEARXNG_BASE_URL
              value: "https://search.winetree94.com/"
            - name: SEARXNG_VALKEY_URL
              valueFrom:
                secretKeyRef:
                  name: searxng-valkey-url-secret
                  key: url
          volumeMounts:
            - name: config-volume
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
            - name: limiter-config-volume
              mountPath: /etc/searxng/limiter.toml
              subPath: limiter.toml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: searxng-config
        - name: limiter-config-volume
          configMap:
            name: searxng-limiter-config
